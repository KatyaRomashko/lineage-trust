          parameterType: STRING
  comp-platform-spark-etl:
    executorLabel: exec-platform-spark-etl
    inputDefinitions:
      parameters:
        agent_id:
          parameterType: STRING
        aws_access_key:
          parameterType: STRING
        aws_secret_key:
          parameterType: STRING
        minio_endpoint:
          parameterType: STRING
        openlineage_url:
          parameterType: STRING
        pg_database:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        pg_password:
          parameterType: STRING
        pg_user:
          parameterType: STRING
        warehouse_table:
          parameterType: STRING
    outputDefinitions:
      parameters:
