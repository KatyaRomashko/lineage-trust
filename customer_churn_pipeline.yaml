# PIPELINE DEFINITION
# Name: customer-churn-ml-pipeline
# Description: End-to-end churn prediction pipeline. PLATFORM: Spark ETL, Feast apply and materialize (infra). DS: data extraction, feature engineering, XGBoost training, evaluation, MLflow registration. OPENLINEAGE_NAMESPACE is injected by the Argo workflow controller. Security: PROV-O, SPIFFE/SPIRE JWT, OPA/Rego, transparency log (optional Rekor), EU date metadata.
# Inputs:
#    agent_id: str [Default: 'spiffe://example.org/ns/churn/pipeline-agent']
#    aws_key: str [Default: 'minioadmin']
#    aws_secret: str [Default: 'minioadmin123']
#    experiment_name: str [Default: 'customer_churn_lineage']
#    feast_repo_path: str [Default: '/app/src/feature_store']
#    hours_deviation: float [Default: 0.0]
#    llm_monitoring_tool: str [Default: 'langsmith']
#    llm_trace_id: str [Default: '']
#    model_name: str [Default: 'customer_churn_model']
#    modify_original_date: bool [Default: False]
#    opa_strict: bool [Default: True]
#    opa_url: str [Default: 'http://opa:8181']
#    pg_host: str [Default: 'postgres']
#    pg_url: str [Default: 'postgresql://feast:feast@postgres:5432/warehouse']
#    redis_host: str [Default: 'redis']
#    regional_policy: str [Default: 'NON_EU']
#    rekor_upload: bool [Default: False]
#    roc_auc_threshold: float [Default: 0.7]
#    s3_endpoint: str [Default: 'http://mlflow-minio:9000']
#    spiffe_dev_identity_json: str [Default: '{"sub": "spiffe://example.org/ns/churn/pipeline-agent"}']
#    spiffe_required: bool [Default: False]
#    table_name: str [Default: 'customer_features']
#    tracking_uri: str [Default: 'openlineage+http://mlflow-server:5000']
