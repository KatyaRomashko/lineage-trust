          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef platform_feast_apply(\n    feast_repo_path: str,\n    pg_host:\
          \ str,\n    redis_host: str,\n    agent_id: str,\n) -> str:\n    \"\"\"\
          Run feast apply to register feature definitions. Emits OpenLineage events.\"\
          \"\"\n    import os\n    import subprocess\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage\n    from src.security.guards import finalize_step_audit,\
          \ pipeline_step_guard\n\n    sec = pipeline_step_guard(\n        step_name=\"\
          platform_feast_apply\",\n        activity_label=\"Feast apply (registry\
