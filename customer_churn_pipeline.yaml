pipelineInfo:
  description: 'End-to-end churn prediction pipeline. PLATFORM: Spark ETL, Feast apply
    and materialize (infra). DS: data extraction, feature engineering, XGBoost training,
    evaluation, MLflow registration. OPENLINEAGE_NAMESPACE is injected by the Argo
    workflow controller. Security: PROV-O, SPIFFE/SPIRE JWT, OPA/Rego, transparency
    log (optional Rekor), EU date metadata.'
  name: customer-churn-ml-pipeline
root:
  dag:
    tasks:
      ds-data-extraction:
        cachingOptions: {}
        componentRef:
          name: comp-ds-data-extraction
        dependentTasks:
        - platform-feast-materialize
        inputs:
          parameters:
            agent_id:
              componentInputParameter: agent_id
            feast_repo_path:
              componentInputParameter: feast_repo_path
            materialize_done:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: platform-feast-materialize
            pg_host:
              componentInputParameter: pg_host
            pg_url:
              componentInputParameter: pg_url
            redis_host:
              componentInputParameter: redis_host
            table_name:
              componentInputParameter: table_name
        taskInfo:
          name: ds-data-extraction
      ds-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-ds-evaluation
        dependentTasks:
        - ds-model-training
        inputs:
          parameters:
            agent_id:
              componentInputParameter: agent_id
            train_result_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: ds-model-training
        taskInfo:
          name: ds-evaluation
      ds-feature-engineering:
        cachingOptions: {}
        componentRef:
          name: comp-ds-feature-engineering
        dependentTasks:
        - ds-data-extraction
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: output_path
                producerTask: ds-data-extraction
          parameters:
            agent_id:
