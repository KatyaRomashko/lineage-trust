  comp-ds-data-extraction:
    executorLabel: exec-ds-data-extraction
    inputDefinitions:
      parameters:
        agent_id:
          parameterType: STRING
        feast_repo_path:
          parameterType: STRING
        materialize_done:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        pg_url:
          parameterType: STRING
        redis_host:
          parameterType: STRING
        table_name:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-ds-evaluation:
    executorLabel: exec-ds-evaluation
    inputDefinitions:
      parameters:
        agent_id:
          parameterType: STRING
        train_result_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-ds-feature-engineering:
    executorLabel: exec-ds-feature-engineering
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        agent_id:
          parameterType: STRING
        hours_deviation:
