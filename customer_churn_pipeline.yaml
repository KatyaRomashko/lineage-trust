          parameterType: STRING
deploymentSpec:
  executors:
    exec-ds-data-extraction:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_data_extraction
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_data_extraction(\n    pg_url: str,\n    feast_repo_path: str,\n\
          \    table_name: str,\n    pg_host: str,\n    redis_host: str,\n    materialize_done:\
          \ str,\n    agent_id: str,\n    output_path: dsl.Output[dsl.Dataset],\n\
          ) -> None:\n    \"\"\"Retrieve historical features from Feast and save as\
          \ parquet.\"\"\"\n    import os\n\n    import pandas as pd\n    from sqlalchemy\
          \ import create_engine, text\n    from feast import FeatureStore\n    from\
          \ openlineage_oai.adapters.kfp import kfp_lineage, kfp_output_with_schema\n\
          \    from src.security.guards import finalize_step_audit, pipeline_step_guard\n\
          \n    sec = pipeline_step_guard(\n        step_name=\"ds_data_extraction\"\
          ,\n        activity_label=\"Feast historical feature extraction\",\n   \
          \     agent_id=agent_id,\n        opa_input=None,\n        used_entities=[{\"\
          label\": \"warehouse.customer_features_view\"}],\n        generated_entities=[{\"\
          label\": \"parquet:extracted_features\"}],\n    )\n\n    ol_namespace =\
          \ os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"default\")\n    feast_project\
          \ = ol_namespace.replace(\"-\", \"_\")\n    fs_yaml = os.path.join(feast_repo_path,\
          \ \"feature_store.yaml\")\n    with open(fs_yaml, \"w\") as f:\n       \
          \ f.write(f\"\"\"\\\nproject: {feast_project}\nprovider: local\nregistry:\n\
          \  registry_type: sql\n  path: postgresql://feast:feast@{pg_host}:5432/warehouse\n\
          \  cache_ttl_seconds: 60\noffline_store:\n  type: postgres\n  host: {pg_host}\n\
          \  port: 5432\n  database: warehouse\n  db_schema: public\n  user: feast\n\
          \  password: feast\nonline_store:\n  type: redis\n  connection_string: {redis_host}:6379\n\
          entity_key_serialization_version: 2\nopenlineage:\n  enabled: true\n  transport_type:\
          \ http\n  transport_url: http://marquez\n  emit_on_apply: true\n  emit_on_materialize:\
          \ true\n\"\"\")\n    print(f\"Patched {fs_yaml} -> pg={pg_host}, redis={redis_host},\
          \ ol_ns={ol_namespace}\")\n\n    with kfp_lineage(\n        \"kfp-data_extraction\"\
          ,\n        inputs=[{\"namespace\": f\"postgres://{pg_host}:5432\", \"name\"\
          : \"warehouse.customer_features_view\"}],\n        outputs=[],\n       \
          \ url=\"http://marquez\",\n    ) as run:\n        engine = create_engine(pg_url)\n\
          \        with engine.connect() as conn:\n            entity_df = pd.read_sql(\n\
          \                text(f\"SELECT entity_id, event_timestamp, churn FROM {table_name}\"\
          ),\n                conn,\n            )\n        engine.dispose()\n   \
          \     entity_df[\"event_timestamp\"] = pd.to_datetime(\n            entity_df[\"\
          event_timestamp\"], utc=True,\n        )\n\n        store = FeatureStore(repo_path=feast_repo_path)\n\
          \        features = [\n            \"customer_features_view:tenure_months\"\
          ,\n            \"customer_features_view:monthly_charges\",\n           \
          \ \"customer_features_view:total_charges\",\n            \"customer_features_view:num_support_tickets\"\
          ,\n            \"customer_features_view:contract_type\",\n            \"\
          customer_features_view:internet_service\",\n            \"customer_features_view:payment_method\"\
          ,\n        ]\n        features_df = store.get_historical_features(\n   \
          \         entity_df=entity_df[[\"entity_id\", \"event_timestamp\"]],\n \
          \           features=features,\n        ).to_df()\n\n        for df_ in\
          \ (features_df, entity_df):\n            df_[\"event_timestamp\"] = pd.to_datetime(\n\
          \                df_[\"event_timestamp\"], utc=True,\n            )\n\n\
          \        result = features_df.merge(\n            entity_df[[\"entity_id\"\
          , \"event_timestamp\", \"churn\"]],\n            on=[\"entity_id\", \"event_timestamp\"\
          ],\n            how=\"left\",\n        )\n        print(f\"DS: data extraction\
          \ complete - shape {result.shape}\")\n        result.to_parquet(output_path.path)\n\
          \        run.add_output(kfp_output_with_schema(output_path, result))\n \
          \   finalize_step_audit(\n        step_name=\"ds_data_extraction\",\n  \
          \      context=sec,\n        result_summary={\"rows\": int(result.shape[0])},\n\
          \    )\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        - name: SPIFFE_DEV_IDENTITY_JSON
          value: '{"sub": "spiffe://example.org/ns/churn/pipeline-agent"}'
        - name: OPA_URL
          value: http://opa:8181
        - name: OPA_STRICT
          value: '1'
        - name: REKOR_UPLOAD
          value: '0'
        - name: SPIFFE_REQUIRED
          value: '0'
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-ds-evaluation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_evaluation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_evaluation(train_result_json: str, agent_id: str) -> str:\n\
          \    \"\"\"Display and return evaluation metrics.\"\"\"\n    import json\n\
          \    import os\n    from openlineage_oai.adapters.kfp import kfp_lineage\n\
          \    from src.security.guards import finalize_step_audit, pipeline_step_guard\n\
          \n    sec = pipeline_step_guard(\n        step_name=\"ds_evaluation\",\n\
          \        activity_label=\"Model evaluation summary\",\n        agent_id=agent_id,\n\
          \        opa_input=None,\n        used_entities=[{\"label\": \"mlflow:train_metrics\"\
          }],\n        generated_entities=[{\"label\": \"metrics:evaluation\"}],\n\
          \    )\n\n    ol_namespace = os.environ.get(\"OPENLINEAGE_NAMESPACE\", \"\
          default\")\n\n    with kfp_lineage(\n        \"kfp-evaluation\",\n     \
          \   inputs=[{\"namespace\": ol_namespace, \"name\": \"model.model\"}],\n\
          \        outputs=[],\n        url=\"http://marquez\",\n    ):\n        result\
          \ = json.loads(train_result_json)\n        m = result[\"metrics\"]\n   \
          \     print(\n            f\"DS: evaluation  ROC-AUC={m['roc_auc']:.4f}\
          \  F1={m['f1']:.4f}  \"\n            f\"Precision={m['precision']:.4f} \
          \ Recall={m['recall']:.4f}\"\n        )\n        out = json.dumps(m)\n \
          \   finalize_step_audit(\n        step_name=\"ds_evaluation\",\n       \
          \ context=sec,\n        result_summary={\"ok\": True},\n    )\n    return\
          \ out\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        - name: SPIFFE_DEV_IDENTITY_JSON
          value: '{"sub": "spiffe://example.org/ns/churn/pipeline-agent"}'
        - name: OPA_URL
          value: http://opa:8181
        - name: OPA_STRICT
          value: '1'
        - name: REKOR_UPLOAD
          value: '0'
        - name: SPIFFE_REQUIRED
          value: '0'
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-ds-feature-engineering:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_feature_engineering
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_feature_engineering(\n    dataset: dsl.Input[dsl.Dataset],\n\
          \    agent_id: str,\n    regional_policy: str,\n    llm_trace_id: str,\n\
          \    llm_monitoring_tool: str,\n    modify_original_date: bool,\n    hours_deviation:\
          \ float,\n    output_path: dsl.Output[dsl.Dataset],\n) -> None:\n    \"\"\
          \"Add derived features; optional Original_Date change under OPA; EU reasoning_hash.\"\
          \"\"\n    import numpy as np\n    import pandas as pd\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage, kfp_output_with_schema\n    from src.security.eu_compliance\
          \ import eu_date_metadata_columns\n    from src.security.guards import finalize_step_audit,\
          \ pipeline_step_guard\n    from src.security.opa_client import evaluate_churn_policy\n\
          \n    sec = pipeline_step_guard(\n        step_name=\"ds_feature_engineering\"\
          ,\n        activity_label=\"Feature engineering (derived columns)\",\n \
          \       agent_id=agent_id,\n        opa_input=None,\n        used_entities=[{\"\
          label\": str(dataset.path)}],\n        generated_entities=[{\"label\": \"\
          parquet:engineered_features\"}],\n    )\n\n    with kfp_lineage(\n     \
          \   \"kfp-feature_engineering\",\n        inputs=[dataset],\n        outputs=[],\n\
          \        url=\"http://marquez\",\n    ) as run:\n        df = pd.read_parquet(dataset.path)\n\
          \        old_ts = str(df[\"event_timestamp\"].min())\n\n        if modify_original_date:\n\
          \            allowed = evaluate_churn_policy(\n                {\n     \
          \               \"action\": \"modify_original_date\",\n                \
          \    \"regional_policy\": regional_policy,\n                    \"hours_deviation\"\
          : float(hours_deviation),\n                    \"agent_id\": agent_id,\n\
          \                },\n            )\n            if not allowed:\n      \
          \          raise PermissionError(\n                    \"OPA denied modify_original_date\
          \ \"\n                    f\"(regional_policy={regional_policy!r}, \"\n\
          \                    f\"hours_deviation={hours_deviation!r})\",\n      \
          \          )\n            delta = pd.Timedelta(hours=float(hours_deviation))\n\
          \            df[\"event_timestamp\"] = pd.to_datetime(\n               \
          \ df[\"event_timestamp\"], utc=True,\n            ) + delta\n\n        new_ts\
          \ = str(df[\"event_timestamp\"].min())\n\n        if regional_policy.upper()\
          \ == \"EU\":\n            meta = eu_date_metadata_columns(\n           \
          \     regional_policy=regional_policy,\n                llm_trace_id=llm_trace_id,\n\
          \                monitoring_tool=llm_monitoring_tool,\n                old_iso=old_ts,\n\
          \                new_iso=new_ts,\n                agent_id=agent_id,\n \
          \           )\n            for k, v in meta.items():\n                df[k]\
          \ = v\n\n        tenure_safe = df[\"tenure_months\"].replace(0, 1)\n   \
          \     df[\"charges_per_month\"] = df[\"total_charges\"] / tenure_safe\n\
          \        df[\"ticket_rate\"] = df[\"num_support_tickets\"] / tenure_safe\n\
          \n        for col in [\"charges_per_month\", \"ticket_rate\"]:\n       \
          \     df[col] = df[col].replace([np.inf, -np.inf], 0.0)\n\n        print(f\"\
          DS: feature engineering complete - shape {df.shape}\")\n        df.to_parquet(output_path.path)\n\
          \        run.add_output(kfp_output_with_schema(output_path, df))\n    finalize_step_audit(\n\
          \        step_name=\"ds_feature_engineering\",\n        context=sec,\n \
          \       result_summary={\n            \"modify_original_date\": modify_original_date,\n\
          \            \"regional_policy\": regional_policy,\n            \"eu_compliance_columns\"\
          : regional_policy.upper() == \"EU\",\n        },\n    )\n\n"
        env:
        - name: OPENLINEAGE_PARENT_JOB_NAME
          value: customer-churn-ml-pipeline
        - name: SPIFFE_DEV_IDENTITY_JSON
          value: '{"sub": "spiffe://example.org/ns/churn/pipeline-agent"}'
        - name: OPA_URL
          value: http://opa:8181
        - name: OPA_STRICT
          value: '1'
        - name: REKOR_UPLOAD
          value: '0'
        - name: SPIFFE_REQUIRED
          value: '0'
        image: image-registry.openshift-image-registry.svc:5000/fkm/fkm-app:latest
    exec-ds-model-registration:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ds_model_registration
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ds_model_registration(\n    train_result_json: str,\n    metrics_json:\
          \ str,\n    model_name: str,\n    tracking_uri: str,\n    s3_endpoint: str,\n\
          \    aws_key: str,\n    aws_secret: str,\n    roc_auc_threshold: float,\n\
          \    agent_id: str,\n) -> str:\n    \"\"\"Register model in MLflow if metrics\
          \ beat the threshold.\"\"\"\n    import json\n    import os\n\n    import\
          \ mlflow\n    from mlflow.tracking import MlflowClient\n    from openlineage_oai.adapters.kfp\
          \ import kfp_lineage\n    from src.security.guards import finalize_step_audit,\
          \ pipeline_step_guard\n\n    sec = pipeline_step_guard(\n        step_name=\"\
          ds_model_registration\",\n        activity_label=\"MLflow model registration\
          \ / alias\",\n        agent_id=agent_id,\n        opa_input=None,\n    \
          \    used_entities=[{\"label\": \"mlflow:model_candidate\"}],\n        generated_entities=[{\"\
          label\": f\"mlflow:registered:{model_name}\"}],\n    )\n\n    os.environ[\"\
          MLFLOW_S3_ENDPOINT_URL\"] = s3_endpoint\n    os.environ[\"AWS_ACCESS_KEY_ID\"\
          ] = aws_key\n    os.environ[\"AWS_SECRET_ACCESS_KEY\"] = aws_secret\n\n\
          \    plain_uri = tracking_uri.replace(\"openlineage+\", \"\")\n    os.environ[\"\
          MLFLOW_REGISTRY_URI\"] = plain_uri\n\n    ol_namespace = os.environ.get(\"\
          OPENLINEAGE_NAMESPACE\", \"default\")\n\n    with kfp_lineage(\n       \
          \ \"kfp-model_registration\",\n        inputs=[{\"namespace\": ol_namespace,\
          \ \"name\": \"model.model\"}],\n        outputs=[{\"namespace\": \"mlflow\"\
          , \"name\": f\"models.{model_name}\"}],\n        url=\"http://marquez\"\
          ,\n    ):\n        result = json.loads(train_result_json)\n        metrics\
          \ = json.loads(metrics_json)\n\n        if metrics[\"roc_auc\"] < roc_auc_threshold:\n\
          \            print(f\"DS: model registration  ROC-AUC {metrics['roc_auc']:.4f}\
          \ < {roc_auc_threshold} - skipping\")\n            out = json.dumps({\"\
          registered\": False, \"reason\": \"below_threshold\"})\n        else:\n\
          \            mlflow.set_tracking_uri(tracking_uri)\n            try:\n \
          \               mv = mlflow.register_model(model_uri=result[\"model_uri\"\
          ], name=model_name)\n                client = MlflowClient()\n         \
          \       client.set_registered_model_alias(model_name, \"champion\", str(mv.version))\n\
          \                print(f\"DS: registered {model_name} v{mv.version} as alias\
          \ 'champion'\")\n                out = json.dumps({\n                  \
          \  \"registered\": True,\n                    \"model_name\": model_name,\n\
          \                    \"version\": int(mv.version),\n                   \
          \ \"alias\": \"champion\",\n                })\n            except Exception\
          \ as e:\n                print(f\"DS: model registration failed (non-fatal):\
          \ {e}\")\n                out = json.dumps({\"registered\": False, \"reason\"\
          : str(e)[:200]})\n    finalize_step_audit(\n        step_name=\"ds_model_registration\"\
          ,\n        context=sec,\n        result_summary={\"registered\": json.loads(out).get(\"\
          registered\", False)},\n    )\n    return out\n\n"
