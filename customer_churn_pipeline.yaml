        llm_monitoring_tool:
          parameterType: STRING
        llm_trace_id:
          parameterType: STRING
        modify_original_date:
          parameterType: BOOLEAN
        regional_policy:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-ds-model-registration:
    executorLabel: exec-ds-model-registration
    inputDefinitions:
      parameters:
        agent_id:
          parameterType: STRING
        aws_key:
          parameterType: STRING
        aws_secret:
          parameterType: STRING
        metrics_json:
          parameterType: STRING
        model_name:
          parameterType: STRING
        roc_auc_threshold:
          parameterType: NUMBER_DOUBLE
        s3_endpoint:
          parameterType: STRING
        tracking_uri:
          parameterType: STRING
        train_result_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-ds-model-training:
    executorLabel: exec-ds-model-training
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        agent_id:
          parameterType: STRING
        aws_key:
          parameterType: STRING
        aws_secret:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        tracking_uri:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-platform-feast-apply:
    executorLabel: exec-platform-feast-apply
    inputDefinitions:
      parameters:
        agent_id:
          parameterType: STRING
        feast_repo_path:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        redis_host:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-platform-feast-materialize:
    executorLabel: exec-platform-feast-materialize
    inputDefinitions:
      parameters:
        agent_id:
          parameterType: STRING
        apply_done:
          parameterType: STRING
        feast_repo_path:
          parameterType: STRING
        pg_host:
          parameterType: STRING
        redis_host:
          parameterType: STRING
    outputDefinitions:
      parameters:
