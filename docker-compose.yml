version: "3.8"

services:
  # ── External Data Source ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/raw-data;
      mc cp /seed/customers.csv local/raw-data/customers.csv;
      echo 'MinIO seed complete';
      "
    volumes:
      - ./data:/seed

  # ── Data Warehouse + Feast Offline Store ──────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: feast
      POSTGRES_PASSWORD: feast
      POSTGRES_DB: warehouse
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feast -d warehouse"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Feast Online Store ────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MLflow Tracking Server ────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://feast:feast@postgres:5432/warehouse
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow-artifacts/
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      mlflow server
      --backend-store-uri postgresql://feast:feast@postgres:5432/warehouse
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Open Policy Agent (Rego policies for churn pipeline) ────────────────
  opa:
    image: openpolicyagent/opa:0.69.0-rootless
    container_name: opa
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro
    command: ["run", "--server", "--addr=:8181", "/policies"]

  # ── FastAPI Inference Service ─────────────────────────────────────────
  inference-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: inference-api
    ports:
      - "8000:8000"
    environment:
      FEAST_REPO_PATH: /app/src/feature_store
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_NAME: customer_churn_model
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy

volumes:
  minio_data:
  pg_data:
