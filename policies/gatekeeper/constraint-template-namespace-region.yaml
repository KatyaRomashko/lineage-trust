apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredregionlabel
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredRegionLabel
      validation:
        openAPIV3Schema:
          type: object
          properties:
            allowedRegions:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredregionlabel

        violation[{"msg": msg}] {
          input.review.kind == "Namespace"
          ns := input.review.object
          labels := ns.metadata.labels
          labels["app.kubernetes.io/part-of"] == "feast-kfp-mlflow"
          not labels["region"]
          msg := "Namespace must carry label region=us|eu for RHACM / trust routing"
        }

        violation[{"msg": msg}] {
          input.review.kind == "Namespace"
          ns := input.review.object
          labels := ns.metadata.labels
          labels["app.kubernetes.io/part-of"] == "feast-kfp-mlflow"
          allowed := {r | r := input.parameters.allowedRegions[_]}
          count(allowed) > 0
          not allowed[labels["region"]]
          msg := sprintf("region %v not in allowed list", [labels["region"]])
        }
