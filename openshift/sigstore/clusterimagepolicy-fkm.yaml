# EXAMPLE — verify apiVersion with: oc explain clusterimagepolicy
# Requires OpenShift image admission integration for signature verification.
apiVersion: config.openshift.io/v1alpha1
kind: ClusterImagePolicy
metadata:
  name: fkm-cosign-signed
spec:
  policies:
    - name: fkm-images-must-be-signed
      matchConstraints:
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: fkm
      reject: true
      acceptors:
        - name: cosign-public-key
          keys:
            - secretRef:
                name: cosign-pub
                namespace: openshift-config
