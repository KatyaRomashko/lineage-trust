# Optional ValidatingAdmissionWebhook — wire to an HTTPS service that runs `cosign verify-blob`.
# Placeholder CA bundle; replace after cert generation (same flow as lineage mutating webhook).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: fkm-agent-card-validator
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
webhooks:
  - name: trust.fkm.io.validate-agent-card
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: agent-card-validator
        namespace: fkm
        path: /validate
        port: 443
      caBundle: 
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: Namespaced
    objectSelector:
      matchLabels:
        trust.fkm.io/require-agent-card: "true"
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: fkm
    sideEffects: None
    timeoutSeconds: 5
    failurePolicy: Ignore
