apiVersion: batch/v1
kind: Job
metadata:
  name: etl-job
  namespace: fkm
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
    stage: "02-etl"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        job: etl
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: registry.access.redhat.com/ubi9:latest
          command:
            - bash
            - -c
            - |
              echo "Waiting for postgres:5432 ..."
              until bash -c "echo > /dev/tcp/postgres/5432" 2>/dev/null; do sleep 2; done
              echo "PostgreSQL is up"
        - name: wait-for-minio
          image: registry.access.redhat.com/ubi9:latest
          command:
            - bash
            - -c
            - |
              echo "Waiting for mlflow-minio:9000 ..."
              until bash -c "echo > /dev/tcp/mlflow-minio/9000" 2>/dev/null; do sleep 2; done
              echo "MinIO is up"
        - name: wait-for-marquez
          image: registry.access.redhat.com/ubi9:latest
          command:
            - bash
            - -c
            - |
              echo "Waiting for marquez:80 ..."
              until bash -c "echo > /dev/tcp/marquez/80" 2>/dev/null; do sleep 2; done
              echo "Marquez is up"
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
      containers:
        - name: spark-etl
          image: image-registry.openshift-image-registry.svc:5000/fkm/spark-etl:latest
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
          env:
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///spiffe-workload-api/spire-agent.sock
            - name: SPIFFE_TRUST_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: fkm-config
                  key: SPIFFE_TRUST_DOMAIN
            - name: FKM_REGION
              valueFrom:
                configMapKeyRef:
                  name: fkm-config
                  key: FKM_REGION
          envFrom:
            - configMapRef:
                name: fkm-config
            - secretRef:
                name: fkm-credentials
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
