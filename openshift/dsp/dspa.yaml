apiVersion: datasciencepipelinesapplications.opendatahub.io/v1
kind: DataSciencePipelinesApplication
metadata:
  name: dspa
  namespace: fkm-test
  labels:
    app.kubernetes.io/part-of: feast-kfp-mlflow
spec:
  dspVersion: v2

  apiServer:
    deploy: true
    cacheEnabled: true
    enableOauth: true
    enableSamplePipeline: false
    pipelineStore: kubernetes

  # Use the built-in MariaDB for pipeline metadata
  database:
    disableHealthCheck: false
    mariaDB:
      deploy: true
      pipelineDBName: mlpipeline
      pvcSize: 5Gi
      username: mlpipeline

  # Point to our existing MinIO for pipeline artifact storage
  objectStorage:
    disableHealthCheck: false
    enableExternalRoute: false
    externalStorage:
      basePath: ""
      bucket: pipeline-artifacts
      host: minio.fkm-test.svc.cluster.local
      port: "9000"
      region: us-east-1
      scheme: http
      s3CredentialsSecret:
        accessKey: AWS_ACCESS_KEY_ID
        secretKey: AWS_SECRET_ACCESS_KEY
        secretName: dspa-s3-credentials

  persistenceAgent:
    deploy: true
    numWorkers: 2

  scheduledWorkflow:
    cronScheduleTimezone: UTC
    deploy: true
