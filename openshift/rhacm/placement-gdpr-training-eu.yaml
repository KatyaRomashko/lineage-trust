# Hub cluster — select EU-labelled managed clusters for GDPR-sensitive training workloads.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: fkm-gdpr-training-eu
  namespace: openshift-gitops
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: region
              operator: In
              values:
                - eu
