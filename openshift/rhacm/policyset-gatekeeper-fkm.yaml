# Hub — distribute Gatekeeper constraints to clusters matched by Placement.
# Replace channel/namespace with your Policy generator output.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-gatekeeper-fkm-bundle
  namespace: openshift-gitops
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: PR.DS-1 Data-at-rest protections
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gatekeeper-constraints-fkm
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: fkm-gatekeeper-bundle-placeholder
                  namespace: openshift-gatekeeper-system
                data:
                  README: |
                    Replace this placeholder with a PolicyGenerator bundle or
                    sync policies/gatekeeper/*.yaml via GitOps Subscription.
